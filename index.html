<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f7a4f">
    <title>2026 효자촌 그린타운 2차 특별 정비구역 동의서 제출 안내</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7f4;
        --surface: #ffffff;
        --ink: #17211b;
        --muted: #66716a;
        --line: #dfe6df;
        --brand: #0f7a4f;
        --brand-dark: #07593a;
        --shadow: 0 10px 28px rgba(20, 36, 28, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--ink);
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        overflow-x: hidden;
      }

      button,
      a {
        -webkit-tap-highlight-color: transparent;
      }

      .app {
        min-height: 100dvh;
        padding: max(14px, env(safe-area-inset-top)) 12px calc(132px + env(safe-area-inset-bottom));
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        padding: 10px 0 12px;
        background: linear-gradient(180deg, var(--bg) 78%, rgba(245, 247, 244, 0));
      }

      .title-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      h1 {
        margin: 0;
        font-size: 19px;
        line-height: 1.25;
        letter-spacing: 0;
      }

      .download {
        display: inline-flex;
        flex: 0 0 auto;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 14px;
        border: 1px solid var(--brand);
        border-radius: 8px;
        color: var(--brand-dark);
        background: var(--surface);
        font-size: 14px;
        font-weight: 700;
        text-decoration: none;
      }

      .viewer {
        display: grid;
        gap: 14px;
        width: 100%;
      }

      .page-shell {
        position: relative;
        width: 100%;
        max-width: 720px;
        margin: 0 auto;
        scroll-margin-top: 92px;
        aspect-ratio: 812 / 1148;
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .page-shell::before {
        content: attr(data-page-label);
        position: absolute;
        top: 8px;
        left: 8px;
        z-index: 1;
        padding: 4px 8px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.88);
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        line-height: 1;
      }

      .page-image {
        display: block;
        width: 100%;
        height: 100%;
        background: #ffffff;
        object-fit: contain;
      }

      .controls {
        position: fixed;
        right: 10px;
        bottom: max(14px, env(safe-area-inset-bottom));
        z-index: 20;
        display: grid;
        grid-template-columns: 1fr;
        gap: 5px;
        width: min(118px, calc(100vw - 20px));
        padding: 5px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
      }

      .jump-button {
        min-height: 30px;
        padding: 0 5px;
        border: 0;
        border-radius: 8px;
        background: #edf4ef;
        color: var(--brand-dark);
        font-size: 10.5px;
        font-weight: 800;
        line-height: 1.15;
      }

      .jump-button.primary {
        min-height: 36px;
        background: var(--brand);
        color: #ffffff;
      }

      @media (max-width: 360px) {
        h1 {
          font-size: 17px;
        }

        .download {
          min-height: 38px;
          padding: 0 12px;
          font-size: 13px;
        }

        .controls {
          width: min(112px, calc(100vw - 20px));
        }

        .jump-button {
          min-height: 30px;
        }
      }

      @media (min-width: 700px) {
        .app {
          width: 440px;
          margin: 0 auto;
        }

        .controls {
          right: calc(50% - 210px);
        }
      }
    </style>
  </head>
  <body>
    <main class="app" id="top">
      <header class="topbar">
        <div class="title-row">
          <h1>2026 효자촌 그린타운 2차 특별 정비구역 동의서 제출 안내</h1>
          <a class="download" href="./전자동의서및서면동의서제출방법.pdf" download>PDF로 다운받기</a>
        </div>
      </header>

      <section class="viewer" aria-label="PDF 이미지 스크롤 뷰어">
        <section class="page-shell" id="page-1" data-page-label="1 / 10" aria-label="1쪽">
          <img class="page-image" src="./pages/page-01.jpg" alt="동의서 제출 안내 1쪽" width="812" height="1148" fetchpriority="high">
        </section>
        <section class="page-shell" id="page-2" data-page-label="2 / 10" aria-label="2쪽">
          <img class="page-image" src="./pages/page-02.jpg" alt="동의서 제출 안내 2쪽" width="812" height="1148" loading="lazy">
        </section>
        <section class="page-shell" id="page-3" data-page-label="3 / 10" aria-label="3쪽">
          <img class="page-image" src="./pages/page-03.jpg" alt="동의서 제출 안내 3쪽" width="812" height="1148" loading="lazy">
        </section>
        <section class="page-shell" id="page-4" data-page-label="4 / 10" aria-label="4쪽">
          <img class="page-image" src="./pages/page-04.jpg" alt="동의서 제출 안내 4쪽" width="812" height="1148" loading="lazy">
        </section>
        <section class="page-shell" id="page-5" data-page-label="5 / 10" aria-label="5쪽">
          <img class="page-image" src="./pages/page-05.jpg" alt="동의서 제출 안내 5쪽" width="812" height="1148" loading="lazy">
        </section>
        <section class="page-shell" id="page-6" data-page-label="6 / 10" aria-label="6쪽">
          <img class="page-image" src="./pages/page-06.jpg" alt="동의서 제출 안내 6쪽" width="812" height="1148" loading="lazy">
        </section>
        <section class="page-shell" id="page-7" data-page-label="7 / 10" aria-label="7쪽">
          <img class="page-image" src="./pages/page-07.jpg" alt="동의서 제출 안내 7쪽" width="812" height="1148" loading="lazy">
        </section>
        <section class="page-shell" id="page-8" data-page-label="8 / 10" aria-label="8쪽">
          <img class="page-image" src="./pages/page-08.jpg" alt="동의서 제출 안내 8쪽" width="812" height="1148" loading="lazy">
        </section>
        <section class="page-shell" id="page-9" data-page-label="9 / 10" aria-label="9쪽">
          <img class="page-image" src="./pages/page-09.jpg" alt="동의서 제출 안내 9쪽" width="812" height="1148" loading="lazy">
        </section>
        <section class="page-shell" id="page-10" data-page-label="10 / 10" aria-label="10쪽">
          <img class="page-image" src="./pages/page-10.jpg" alt="동의서 제출 안내 10쪽" width="812" height="1148" loading="lazy">
        </section>
      </section>
    </main>

    <nav class="controls" aria-label="바로가기">
      <button class="jump-button" id="topButton" type="button">TOP</button>
      <button class="jump-button primary" id="electronicButton" type="button">얼마집 전자동의<br>안내</button>
      <button class="jump-button primary" id="paperButton" type="button">서면 동의 안내</button>
    </nav>

    <script>
      const topButton = document.getElementById("topButton");
      const electronicButton = document.getElementById("electronicButton");
      const paperButton = document.getElementById("paperButton");

      function scrollToTarget(id) {
        const element = document.getElementById(id);
        if (element) {
          element.scrollIntoView({ behavior: "smooth", block: "start" });
        }
      }

      topButton.addEventListener("click", () => {
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
      electronicButton.addEventListener("click", () => scrollToTarget("page-2"));
      paperButton.addEventListener("click", () => scrollToTarget("page-8"));
    </script>
  </body>
</html>
