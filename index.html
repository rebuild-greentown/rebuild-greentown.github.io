<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f7a4f">
    <title>2026 효자촌 그린타운 2차 특별 정비구역 동의서 제출 안내</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7f4;
        --surface: #ffffff;
        --ink: #17211b;
        --muted: #66716a;
        --line: #dfe6df;
        --brand: #0f7a4f;
        --brand-dark: #07593a;
        --shadow: 0 10px 28px rgba(20, 36, 28, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--ink);
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        overflow-x: hidden;
      }

      button,
      a {
        -webkit-tap-highlight-color: transparent;
      }

      .app {
        min-height: 100dvh;
        padding: max(14px, env(safe-area-inset-top)) 12px calc(132px + env(safe-area-inset-bottom));
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        display: grid;
        gap: 10px;
        padding: 10px 0 12px;
        background: linear-gradient(180deg, var(--bg) 78%, rgba(245, 247, 244, 0));
      }

      .title-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      h1 {
        margin: 0;
        font-size: 19px;
        line-height: 1.25;
        letter-spacing: 0;
      }

      .subtitle {
        margin: 2px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.4;
      }

      .download {
        display: inline-flex;
        flex: 0 0 auto;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 14px;
        border: 1px solid var(--brand);
        border-radius: 8px;
        color: var(--brand-dark);
        background: var(--surface);
        font-size: 14px;
        font-weight: 700;
        text-decoration: none;
      }

      .status {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        min-height: 38px;
        padding: 8px 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.9);
        color: var(--muted);
        font-size: 14px;
      }

      .page-count {
        color: var(--ink);
        font-weight: 800;
      }

      .viewer {
        display: grid;
        gap: 14px;
        width: 100%;
      }

      .page-shell {
        position: relative;
        display: grid;
        place-items: center;
        width: 100%;
        max-width: 720px;
        min-height: 48dvh;
        margin: 0 auto;
        scroll-margin-top: 92px;
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .page-shell::before {
        content: attr(data-page-label);
        position: absolute;
        top: 8px;
        left: 8px;
        z-index: 1;
        padding: 4px 8px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.88);
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        line-height: 1;
      }

      canvas {
        display: block;
        width: 100%;
        height: auto;
        background: #ffffff;
      }

      .message {
        display: grid;
        place-items: center;
        min-height: 52dvh;
        padding: 24px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        color: var(--muted);
        font-size: 15px;
        line-height: 1.5;
        text-align: center;
      }

      .error {
        color: #8b1f1f;
      }

      .hidden {
        display: none;
      }

      .controls {
        position: fixed;
        right: 10px;
        bottom: max(14px, env(safe-area-inset-bottom));
        z-index: 20;
        display: grid;
        grid-template-columns: 1fr;
        gap: 5px;
        width: min(118px, calc(100vw - 20px));
        padding: 5px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
      }

      .jump-button {
        min-height: 30px;
        padding: 0 5px;
        border: 0;
        border-radius: 8px;
        background: #edf4ef;
        color: var(--brand-dark);
        font-size: 10.5px;
        font-weight: 800;
        line-height: 1.15;
      }

      .jump-button.primary {
        min-height: 36px;
        background: var(--brand);
        color: #ffffff;
      }

      @media (max-width: 360px) {
        h1 {
          font-size: 17px;
        }

        .download {
          min-height: 38px;
          padding: 0 12px;
          font-size: 13px;
        }

        .controls {
          width: min(112px, calc(100vw - 20px));
        }

        .jump-button {
          min-height: 30px;
        }
      }

      @media (min-width: 700px) {
        .app {
          width: 440px;
          margin: 0 auto;
        }

        .controls {
          right: calc(50% - 210px);
        }
      }
    </style>
  </head>
  <body>
    <main class="app" id="top">
      <header class="topbar">
        <div class="title-row">
          <div>
            <h1>2026 효자촌 그린타운 2차 특별 정비구역 동의서 제출 안내</h1>
          </div>
          <a class="download" href="./전자동의서및서면동의서제출방법.pdf" download>PDF로 다운받기</a>
        </div>
      </header>

      <section class="viewer" id="pdfPages" aria-label="PDF 스크롤 뷰어">
        <div class="message" id="loading">PDF를 불러오는 중입니다.</div>
        <div class="message error hidden" id="error">
          PDF를 표시하지 못했습니다.<br>
          상단의 PDF 버튼으로 원본 파일을 열어주세요.
        </div>
      </section>
    </main>

    <nav class="controls" aria-label="바로가기">
      <button class="jump-button" id="topButton" type="button">TOP</button>
      <button class="jump-button primary" id="electronicButton" type="button" aria-label="얼마집 전자동의 안내">얼마집 전자동의<br>안내</button>
      <button class="jump-button primary" id="paperButton" type="button" aria-label="서면 동의 안내">서면 동의 안내</button>
    </nav>

    <script type="module">
      import * as pdfjsLib from "./vendor/pdf.min.mjs";

      pdfjsLib.GlobalWorkerOptions.workerSrc = "./vendor/pdf.worker.min.mjs";

      const pdfUrl = "./전자동의서및서면동의서제출방법.pdf";
      const pdfPages = document.getElementById("pdfPages");
      const loading = document.getElementById("loading");
      const error = document.getElementById("error");
      const topButton = document.getElementById("topButton");
      const electronicButton = document.getElementById("electronicButton");
      const paperButton = document.getElementById("paperButton");

      const jumpTargets = {
        electronic: 2,
        paper: 8,
      };

      let pdfDocument = null;

      function scrollToTarget(target) {
        const element = document.getElementById(target);
        if (element) {
          element.scrollIntoView({ behavior: "smooth", block: "start" });
        }
      }

      async function renderPage(pageIndex, shell, canvas) {
        const page = await pdfDocument.getPage(pageIndex);
        const viewport = page.getViewport({ scale: 1 });
        const shellWidth = shell.clientWidth;
        const deviceScale = Math.min(window.devicePixelRatio || 1, 2);
        const fitScale = shellWidth / viewport.width;
        const scaledViewport = page.getViewport({ scale: fitScale * deviceScale });
        const context = canvas.getContext("2d");

        canvas.width = Math.floor(scaledViewport.width);
        canvas.height = Math.floor(scaledViewport.height);
        canvas.style.width = `${Math.floor(scaledViewport.width / deviceScale)}px`;
        canvas.style.height = `${Math.floor(scaledViewport.height / deviceScale)}px`;

        await page.render({
          canvasContext: context,
          viewport: scaledViewport,
        }).promise;
      }

      async function renderAllPages() {
        loading.classList.add("hidden");
        error.classList.add("hidden");
        pdfPages.replaceChildren();

        for (let pageIndex = 1; pageIndex <= pdfDocument.numPages; pageIndex += 1) {
          const shell = document.createElement("section");
          const canvas = document.createElement("canvas");
          shell.className = "page-shell";
          shell.id = `page-${pageIndex}`;
          shell.dataset.pageLabel = `${pageIndex} / ${pdfDocument.numPages}`;
          shell.setAttribute("aria-label", `${pageIndex}쪽`);
          shell.append(canvas);
          pdfPages.append(shell);

          await renderPage(pageIndex, shell, canvas);
        }
      }

      topButton.addEventListener("click", () => {
        window.scrollTo({ top: 0, behavior: "smooth" });
      });

      electronicButton.addEventListener("click", () => scrollToTarget(`page-${jumpTargets.electronic}`));
      paperButton.addEventListener("click", () => scrollToTarget(`page-${jumpTargets.paper}`));

      async function boot() {
        try {
          pdfDocument = await pdfjsLib.getDocument(pdfUrl).promise;
          await renderAllPages();
        } catch {
          loading.classList.add("hidden");
          error.classList.remove("hidden");
        }
      }

      boot();
    </script>
  </body>
</html>
